<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天猫运营工作流程管理系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: #f5f7fa;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* 左侧款式列表 */
        .style-panel {
            width: 30%;
            min-width: 280px;
            max-width: 400px;
            background: #fff;
            border-right: 1px solid #e8ecf0;
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            padding: 16px 20px;
            background: linear-gradient(135deg, #ff6b35 0%, #f7c948 100%);
            color: #fff;
        }

        .panel-header h2 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .search-box {
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 10px 36px 10px 14px;
            border: none;
            border-radius: 6px;
            background: rgba(255,255,255,0.95);
            font-size: 14px;
            color: #333;
        }

        .search-box input::placeholder {
            color: #999;
        }

        .search-icon {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
            font-size: 14px;
        }

        .style-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .style-item {
            padding: 12px 16px;
            margin: 4px 0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
        }

        .style-item:hover {
            background: #fff5f0;
        }

        .style-item.active {
            background: #fff5f0;
            border-color: #ff6b35;
        }

        .style-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .style-name {
            font-weight: 600;
            color: #333;
            font-size: 15px;
        }

        .style-badge {
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 500;
        }

        .badge-pending {
            background: #fff3e0;
            color: #ff9800;
        }

        .badge-progress {
            background: #e3f2fd;
            color: #2196f3;
        }

        .badge-completed {
            background: #e8f5e9;
            color: #4caf50;
        }

        .progress-bar {
            height: 4px;
            background: #eee;
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff6b35, #f7c948);
            border-radius: 2px;
            transition: width 0.3s;
        }

        .style-meta {
            display: flex;
            justify-content: space-between;
            margin-top: 6px;
            font-size: 12px;
            color: #999;
        }

        /* 右侧工作流程 */
        .workflow-panel {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
        }

        .workflow-header {
            background: #fff;
            border-radius: 12px;
            padding: 20px 24px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .current-style {
            font-size: 20px;
            font-weight: 700;
            color: #333;
            margin-bottom: 4px;
        }

        .current-style-en {
            font-size: 13px;
            color: #999;
            margin-bottom: 16px;
        }

        .overall-progress {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .overall-progress .label {
            font-size: 14px;
            color: #666;
            white-space: nowrap;
        }

        .overall-progress .bar {
            flex: 1;
            height: 8px;
            background: #f0f0f0;
            border-radius: 4px;
            overflow: hidden;
        }

        .overall-progress .fill {
            height: 100%;
            background: linear-gradient(90deg, #ff6b35, #f7c948);
            border-radius: 4px;
            transition: width 0.4s;
        }

        .overall-progress .percent {
            font-size: 16px;
            font-weight: 700;
            color: #ff6b35;
            min-width: 50px;
            text-align: right;
        }

        .workflow-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }

        .task-card {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            transition: all 0.3s;
            border: 2px solid transparent;
            position: relative;
            overflow: hidden;
        }

        .task-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(255,107,53,0.15);
        }

        .task-card.completed {
            border-color: #4caf50;
            background: linear-gradient(135deg, #fff 0%, #f8fff8 100%);
        }

        .task-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .task-index {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff6b35 0%, #f7c948 100%);
            color: #fff;
            font-size: 13px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .task-card.completed .task-index {
            background: #4caf50;
        }

        .task-status {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-pending {
            background: #fff3e0;
            color: #ff9800;
        }

        .status-completed {
            background: #e8f5e9;
            color: #4caf50;
        }

        .task-title {
            font-size: 15px;
            font-weight: 600;
            color: #333;
            margin-bottom: 6px;
            line-height: 1.4;
        }

        .task-assignee {
            font-size: 12px;
            color: #999;
            margin-bottom: 12px;
        }

        .task-card-actions {
            display: flex;
            gap: 8px;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            flex: 1;
        }

        .btn-complete {
            background: linear-gradient(135deg, #4caf50 0%, #66bb6a 100%);
            color: #fff;
        }

        .btn-complete:hover {
            transform: scale(1.02);
            box-shadow: 0 2px 8px rgba(76,175,80,0.3);
        }

        .btn-reset {
            background: #f5f5f5;
            color: #666;
        }

        .btn-reset:hover {
            background: #eee;
        }

        .completed-info {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px dashed #eee;
            font-size: 12px;
            color: #999;
        }

        .completed-info .time {
            color: #4caf50;
            font-weight: 500;
        }

        /* 空状态 */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #999;
        }

        .empty-icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-text {
            font-size: 16px;
        }

        /* 邮件发送提示 */
        .email-toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #fff;
            border-radius: 8px;
            padding: 12px 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            display: flex;
            align-items: center;
            gap: 10px;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s;
            z-index: 1000;
        }

        .email-toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .email-toast.success {
            border-left: 4px solid #4caf50;
        }

        .email-toast.error {
            border-left: 4px solid #f44336;
        }

        /* 统计卡片 */
        .stats-bar {
            display: flex;
            gap: 16px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: #fff;
            border-radius: 10px;
            padding: 16px 20px;
            flex: 1;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .stat-card .value {
            font-size: 24px;
            font-weight: 700;
            color: #333;
        }

        .stat-card .label {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }

        .stat-card.highlight .value {
            color: #ff6b35;
        }

        /* 滚动条美化 */
        .style-list::-webkit-scrollbar {
            width: 6px;
        }

        .style-list::-webkit-scrollbar-thumb {
            background: #ddd;
            border-radius: 3px;
        }

        .workflow-panel::-webkit-scrollbar {
            width: 8px;
        }

        .workflow-panel::-webkit-scrollbar-thumb {
            background: #ddd;
            border-radius: 4px;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            .style-panel {
                width: 100%;
                max-width: none;
                height: 40vh;
                border-right: none;
                border-bottom: 1px solid #e8ecf0;
            }
            .workflow-panel {
                height: 60vh;
            }
            .workflow-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 左侧款式列表 -->
        <div class="style-panel">
            <div class="panel-header">
                <h2>📦 款式列表</h2>
                <div class="search-box">
                    <input type="text" id="styleSearch" placeholder="搜索款式...">
                    <span class="search-icon">🔍</span>
                </div>
            </div>
            <div class="style-list" id="styleList"></div>
        </div>

        <!-- 右侧工作流程 -->
        <div class="workflow-panel" id="workflowPanel">
            <div class="empty-state">
                <div class="empty-icon">📋</div>
                <div class="empty-text">请从左侧选择一个款式</div>
            </div>
        </div>
    </div>

    <!-- 邮件提示 -->
    <div class="email-toast" id="emailToast"></div>

    <script>
        // 款式列表
        const STYLES = ["2406", "1901", "2233X", "2406W", "2332", "2330", "2503", "2505", "2221N", "2689", "2685", "2233BW", "2503Q", "2407B", "2406X", "087N", "0087W", "2505Q", "PDD_10", "2233N", "2409B", "2409", "2406Q", "3610B", "2511", "2233BN", "0087", "001Y", "0028", "005R", "0081B", "028B", "087B", "1900", "2002A", "2009", "2013", "21051X", "21057B", "2201", "2221", "2221M", "2233Q", "2236", "2260A", "2361", "2369", "24059", "2411", "24775B", "2505B", "2510", "2515", "2515B", "2518", "2525", "3610", "3612", "5252", "5555", "775A", "775X", "BUFA", "Z003"];

        // 工作流程任务
        const WORKFLOW_TASKS = [
            { id: 'main_image', name: '主图【鑫垭】', assignee: '鑫垭' },
            { id: 'video', name: '视频【王政】', assignee: '王政' },
            { id: 'review', name: '评价【鑫垭】', assignee: '鑫垭' },
            { id: 'buyer_show', name: '买家秀模块【鑫垭】', assignee: '鑫垭' },
            { id: 'qna', name: '问大家【鑫垭】', assignee: '鑫垭' },
            { id: 'material', name: '新品运营中心素材补全【鑫垭】', assignee: '鑫垭' },
            { id: 'sales', name: '销量计划', assignee: '运营' },
            { id: 'micro', name: '微淘发布', assignee: '鑫垭' },
            { id: 'short_video', name: '短视频【王政】', assignee: '王政' }
        ];

        // 邮箱配置
        const EMAIL_CONFIG = {
            from: '15005818906@coze.email',
            to: '386319800@qq.com'
        };

        // 数据管理
        const DataManager = {
            STORAGE_KEY: 'tmall_workflow_data',

            init() {
                const saved = localStorage.getItem(this.STORAGE_KEY);
                if (saved) {
                    return JSON.parse(saved);
                }
                // 初始化数据结构
                const data = {
                    styles: STYLES,
                    workflows: {}
                };
                STYLES.forEach(style => {
                    data.workflows[style] = {};
                    WORKFLOW_TASKS.forEach(task => {
                        data.workflows[style][task.id] = {
                            status: 'pending',
                            completed_at: null
                        };
                    });
                });
                this.save(data);
                return data;
            },

            save(data) {
                localStorage.setItem(this.STORAGE_KEY, JSON.stringify(data));
            },

            getData() {
                const saved = localStorage.getItem(this.STORAGE_KEY);
                return saved ? JSON.parse(saved) : this.init();
            },

            updateTaskStatus(style, taskId, status) {
                const data = this.getData();
                data.workflows[style][taskId].status = status;
                data.workflows[style][taskId].completed_at = status === 'completed' 
                    ? new Date().toISOString() 
                    : null;
                this.save(data);
                return data.workflows[style][taskId];
            },

            getStyleProgress(style) {
                const data = this.getData();
                const workflow = data.workflows[style];
                const completed = Object.values(workflow).filter(t => t.status === 'completed').length;
                return {
                    completed,
                    total: WORKFLOW_TASKS.length,
                    percent: Math.round((completed / WORKFLOW_TASKS.length) * 100)
                };
            },

            getOverallStats() {
                const data = this.getData();
                let totalCompleted = 0;
                let totalTasks = STYLES.length * WORKFLOW_TASKS.length;
                
                STYLES.forEach(style => {
                    Object.values(data.workflows[style]).forEach(task => {
                        if (task.status === 'completed') totalCompleted++;
                    });
                });
                
                return {
                    totalStyles: STYLES.length,
                    totalTasks,
                    completedTasks: totalCompleted,
                    percent: Math.round((totalCompleted / totalTasks) * 100)
                };
            }
        };

        // 邮件服务（预留接口）
        const EmailService = {
            async send(styleName, taskName, completedAt) {
                // 预留API调用接口
                // 实际使用时替换为真实的API调用
                const payload = {
                    from: EMAIL_CONFIG.from,
                    to: EMAIL_CONFIG.to,
                    subject: `【审核提醒】款式 ${styleName} - ${taskName} 已完成`,
                    body: `
款式：${styleName}
任务：${taskName}
完成时间：${new Date(completedAt).toLocaleString('zh-CN')}
                    `.trim()
                };

                console.log('📧 邮件发送请求:', payload);

                // 模拟API调用延迟
                return new Promise((resolve) => {
                    setTimeout(() => {
                        // 实际场景中使用 fetch 调用后端API
                        // await fetch('/api/send-email', {
                        //     method: 'POST',
                        //     headers: { 'Content-Type': 'application/json' },
                        //     body: JSON.stringify(payload)
                        // });
                        
                        resolve({ success: true, payload });
                    }, 500);
                });
            }
        };

        // UI管理
        const UIManager = {
            currentStyle: null,

            init() {
                this.renderStyleList();
                this.bindEvents();
            },

            renderStyleList(filter = '') {
                const list = document.getElementById('styleList');
                const filteredStyles = STYLES.filter(s => 
                    s.toLowerCase().includes(filter.toLowerCase())
                );

                list.innerHTML = filteredStyles.map(style => {
                    const progress = DataManager.getStyleProgress(style);
                    let badgeClass, badgeText;
                    
                    if (progress.completed === 0) {
                        badgeClass = 'badge-pending';
                        badgeText = '待开始';
                    } else if (progress.completed === progress.total) {
                        badgeClass = 'badge-completed';
                        badgeText = '已完成';
                    } else {
                        badgeClass = 'badge-progress';
                        badgeText = '进行中';
                    }

                    return `
                        <div class="style-item ${this.currentStyle === style ? 'active' : ''}" 
                             data-style="${style}">
                            <div class="style-item-header">
                                <span class="style-name">${style}</span>
                                <span class="style-badge ${badgeClass}">${badgeText}</span>
                            </div>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${progress.percent}%"></div>
                            </div>
                            <div class="style-meta">
                                <span>${progress.completed}/${progress.total} 任务</span>
                                <span>${progress.percent}%</span>
                            </div>
                        </div>
                    `;
                }).join('');
            },

            renderWorkflowPanel(style) {
                const panel = document.getElementById('workflowPanel');
                const data = DataManager.getData();
                const workflow = data.workflows[style];
                const stats = DataManager.getOverallStats();
                const styleProgress = DataManager.getStyleProgress(style);

                panel.innerHTML = `
                    <!-- 统计栏 -->
                    <div class="stats-bar">
                        <div class="stat-card highlight">
                            <div class="value">${stats.completedTasks}</div>
                            <div class="label">已完成任务</div>
                        </div>
                        <div class="stat-card">
                            <div class="value">${stats.totalTasks - stats.completedTasks}</div>
                            <div class="label">待完成任务</div>
                        </div>
                        <div class="stat-card">
                            <div class="value">${stats.percent}%</div>
                            <div class="label">总进度</div>
                        </div>
                    </div>

                    <!-- 当前款式头部 -->
                    <div class="workflow-header">
                        <div class="current-style">📋 当前款式：${style}</div>
                        <div class="current-style-en">Style: ${style}</div>
                        <div class="overall-progress">
                            <span class="label">款式进度</span>
                            <div class="bar">
                                <div class="fill" style="width: ${styleProgress.percent}%"></div>
                            </div>
                            <span class="percent">${styleProgress.percent}%</span>
                        </div>
                    </div>

                    <!-- 任务卡片网格 -->
                    <div class="workflow-grid">
                        ${WORKFLOW_TASKS.map((task, index) => {
                            const taskData = workflow[task.id];
                            const isCompleted = taskData.status === 'completed';
                            
                            return `
                                <div class="task-card ${isCompleted ? 'completed' : ''}" data-task="${task.id}">
                                    <div class="task-card-header">
                                        <span class="task-index">${index + 1}</span>
                                        <span class="task-status ${isCompleted ? 'status-completed' : 'status-pending'}">
                                            ${isCompleted ? '✓ 已完成' : '○ 待处理'}
                                        </span>
                                    </div>
                                    <div class="task-title">${task.name}</div>
                                    <div class="task-assignee">负责人：${task.assignee}</div>
                                    <div class="task-card-actions">
                                        ${isCompleted ? `
                                            <button class="btn btn-reset" onclick="App.resetTask('${style}', '${task.id}')">
                                                🔄 重置
                                            </button>
                                        ` : `
                                            <button class="btn btn-complete" onclick="App.completeTask('${style}', '${task.id}')">
                                                ✓ 完成
                                            </button>
                                        `}
                                    </div>
                                    ${isCompleted && taskData.completed_at ? `
                                        <div class="completed-info">
                                            完成时间：<span class="time">${new Date(taskData.completed_at).toLocaleString('zh-CN')}</span>
                                        </div>
                                    ` : ''}
                                </div>
                            `;
                        }).join('')}
                    </div>
                `;
            },

            showToast(message, type = 'success') {
                const toast = document.getElementById('emailToast');
                toast.className = `email-toast ${type}`;
                toast.innerHTML = type === 'success' 
                    ? `<span>✓</span> ${message}`
                    : `<span>✗</span> ${message}`;
                toast.classList.add('show');
                
                setTimeout(() => {
                    toast.classList.remove('show');
                }, 3000);
            },

            bindEvents() {
                // 款式搜索
                document.getElementById('styleSearch').addEventListener('input', (e) => {
                    this.renderStyleList(e.target.value);
                });

                // 款式点击
                document.getElementById('styleList').addEventListener('click', (e) => {
                    const item = e.target.closest('.style-item');
                    if (item) {
                        const style = item.dataset.style;
                        this.currentStyle = style;
                        this.renderStyleList(document.getElementById('styleSearch').value);
                        this.renderWorkflowPanel(style);
                    }
                });
            }
        };

        // 应用入口
        const App = {
            async init() {
                DataManager.init();
                UIManager.init();
            },

            async completeTask(style, taskId) {
                const task = DataManager.updateTaskStatus(style, taskId, 'completed');
                UIManager.renderWorkflowPanel(style);
                UIManager.renderStyleList(document.getElementById('styleSearch').value);

                // 获取任务名称
                const taskInfo = WORKFLOW_TASKS.find(t => t.id === taskId);

                // 发送邮件通知
                try {
                    await EmailService.send(style, taskInfo.name, task.completed_at);
                    UIManager.showToast(`📧 已通知老司机：${style} - ${taskInfo.name} 已完成`);
                } catch (error) {
                    UIManager.showToast('邮件发送失败', 'error');
                }
            },

            resetTask(style, taskId) {
                DataManager.updateTaskStatus(style, taskId, 'pending');
                UIManager.renderWorkflowPanel(style);
                UIManager.renderStyleList(document.getElementById('styleSearch').value);
                UIManager.showToast('任务已重置');
            }
        };

        // 启动应用
        document.addEventListener('DOMContentLoaded', () => {
            App.init();
        });
    </script>
</body>
</html>
