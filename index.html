<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天猫运营工作流程管理系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: linear-gradient(135deg, #1e1b4b 0%, #4c1d95 50%, #1e1b4b 100%); min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .card { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); }
        .card:hover { border-color: rgba(255,255,255,0.4); }
        .progress-bar { background: linear-gradient(90deg, #34d399, #10b981, #059669); }
    </style>
</head>
<body class="text-white p-4">
    <div class="max-w-6xl mx-auto">
        <!-- 标题 -->
        <div class="text-center mb-6">
            <h1 class="text-3xl font-bold mb-2">天猫运营工作流程管理系统</h1>
            <p class="text-purple-300">Tmall Operation Workflow</p>
        </div>
        
        <!-- 进度条 -->
        <div class="card rounded-xl p-4 mb-6">
            <div class="flex justify-between mb-2">
                <span>整体进度</span>
                <span id="progressText">0 / 9 (0%)</span>
            </div>
            <div class="h-3 bg-white/10 rounded-full overflow-hidden">
                <div id="progressBar" class="h-full progress-bar transition-all duration-500" style="width: 0%"></div>
            </div>
        </div>
        
        <!-- 依赖说明 -->
        <div class="bg-amber-500/20 border border-amber-500/40 rounded-xl p-4 mb-6">
            <p class="font-medium">⚠️ 依赖规则说明</p>
            <p class="text-sm text-amber-200 mt-1">「评价」环节需在「销量」完成3天后才能开始执行，其他环节可并行处理。</p>
        </div>
        
        <!-- 任务列表 -->
        <div id="taskList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            <!-- 任务卡片将通过JS动态生成 -->
        </div>
    </div>
    
    <!-- 上传对话框 -->
    <div id="uploadModal" class="fixed inset-0 bg-black/70 flex items-center justify-center z-50 hidden">
        <div class="bg-slate-800 rounded-2xl w-full max-w-md p-6 m-4">
            <h3 class="text-xl font-bold mb-4">上传完成截图</h3>
            <p class="text-slate-400 mb-4" id="uploadTaskName"></p>
            <input type="file" id="fileInput" accept="image/*" class="hidden">
            <div id="dropZone" class="border-2 border-dashed border-slate-500 rounded-xl p-8 text-center cursor-pointer hover:border-purple-500 mb-4">
                <p class="text-slate-400">点击或拖拽上传截图</p>
                <img id="previewImg" class="max-h-48 mx-auto rounded-lg hidden">
            </div>
            <div class="flex justify-end gap-3">
                <button onclick="closeUploadModal()" class="px-4 py-2 bg-slate-600 rounded-lg">取消</button>
                <button onclick="confirmUpload()" class="px-4 py-2 bg-green-500 rounded-lg" id="confirmBtn" disabled>确认完成</button>
            </div>
        </div>
    </div>
    
    <!-- Toast通知 -->
    <div id="toast" class="fixed top-4 right-4 px-6 py-3 bg-green-500 rounded-lg shadow-lg transform translate-x-full transition-transform duration-300 z-50"></div>

    <script>
        // 任务数据
        const defaultTasks = [
            { id: 'main_image', name: '主图', responsible: '鑫垭', email: '386319800@qq.com', status: 'pending', order: 1 },
            { id: 'video', name: '视频', responsible: '王政', email: '386319800@qq.com', status: 'pending', order: 2 },
            { id: 'short_video', name: '短视频', responsible: '王政', email: '386319800@qq.com', status: 'pending', order: 3 },
            { id: 'new_product', name: '新品运营中心素材补全', responsible: '鑫垭', email: '386319800@qq.com', status: 'pending', order: 4 },
            { id: 'buyer_show', name: '买家秀模块', responsible: '鑫垭', email: '386319800@qq.com', status: 'pending', order: 5 },
            { id: 'qna', name: '问大家', responsible: '鑫垭', email: '386319800@qq.com', status: 'pending', order: 6 },
            { id: 'sales', name: '销量', responsible: '灵活调整', email: '386319800@qq.com', status: 'pending', order: 7 },
            { id: 'review', name: '评价', responsible: '鑫垭', email: '386319800@qq.com', status: 'pending', dependencies: ['sales'], order: 8 },
            { id: 'promotion', name: '推广', responsible: '待定', email: '386319800@qq.com', status: 'pending', order: 9 }
        ];
        
        let tasks = [];
        let currentTask = null;
        let selectedFile = null;
        
        // 初始化
        function init() {
            const saved = localStorage.getItem('tmall_tasks');
            if (saved) {
                tasks = JSON.parse(saved);
            } else {
                tasks = defaultTasks.map(t => ({...t, screenshot: null, completed_at: null}));
            }
            renderTasks();
            updateProgress();
        }
        
        // 保存数据
        function saveData() {
            localStorage.setItem('tmall_tasks', JSON.stringify(tasks));
        }
        
        // 渲染任务
        function renderTasks() {
            const container = document.getElementById('taskList');
            container.innerHTML = '';
            
            tasks.forEach(task => {
                const isAvailable = checkTaskAvailable(task);
                const card = document.createElement('div');
                card.className = 'card rounded-xl overflow-hidden ' + 
                    (task.status === 'completed' ? 'ring-2 ring-green-500' : '') +
                    (task.status === 'in_progress' ? 'ring-2 ring-amber-500' : '') +
                    (!isAvailable ? 'opacity-60' : '');
                
                let statusBadge = '';
                let statusText = '';
                let statusColor = '';
                
                if (task.status === 'completed') {
                    statusText = '✓ 已完成';
                    statusColor = 'bg-green-500';
                } else if (task.status === 'in_progress') {
                    statusText = '▶ 进行中';
                    statusColor = 'bg-amber-500';
                } else if (!isAvailable) {
                    statusText = '⛔ 等待中';
                    statusColor = 'bg-red-500';
                } else {
                    statusText = '○ 待开始';
                    statusColor = 'bg-slate-600';
                }
                
                let buttonHtml = '';
                if (task.status === 'pending' && isAvailable) {
                    buttonHtml = `<button onclick="startTask('${task.id}')" class="w-full py-2 bg-amber-500 hover:bg-amber-600 rounded-lg font-medium">开始执行</button>`;
                } else if (task.status === 'in_progress') {
                    buttonHtml = `<button onclick="openUploadModal('${task.id}')" class="w-full py-2 bg-green-500 hover:bg-green-600 rounded-lg font-medium">上传截图完成</button>`;
                } else if (task.status === 'completed') {
                    buttonHtml = `<button onclick="undoTask('${task.id}')" class="w-full py-2 bg-slate-600 hover:bg-slate-500 rounded-lg">撤销</button>`;
                }
                
                let depHtml = '';
                if (task.dependencies && task.dependencies.length > 0) {
                    const dep = tasks.find(t => t.id === task.dependencies[0]);
                    if (dep) {
                        const depColor = dep.status === 'completed' ? 'bg-green-500/30 text-green-400' : 'bg-amber-500/30 text-amber-400';
                        depHtml = `<div class="mb-3"><span class="text-xs text-slate-400">依赖：</span><span class="text-xs px-2 py-1 rounded ${depColor}">${dep.name}</span></div>`;
                    }
                }
                
                let screenshotHtml = '';
                if (task.screenshot) {
                    screenshotHtml = `<div class="mb-3"><img src="${task.screenshot}" class="w-full h-24 object-cover rounded-lg"></div>`;
                }
                
                let completedHtml = '';
                if (task.completed_at) {
                    completedHtml = `<div class="text-xs text-green-400 mb-2">完成于：${task.completed_at}</div>`;
                }
                
                card.innerHTML = `
                    <div class="p-4 border-b border-white/10 flex justify-between items-center">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 ${statusColor} rounded-lg flex items-center justify-center font-bold">${task.order}</div>
                            <div>
                                <h3 class="font-bold">${task.name}</h3>
                                <p class="text-sm text-purple-300">${task.responsible}</p>
                            </div>
                        </div>
                        <span class="px-2 py-1 rounded text-xs ${statusColor}">${statusText}</span>
                    </div>
                    <div class="p-4">
                        ${depHtml}
                        ${screenshotHtml}
                        ${completedHtml}
                        ${buttonHtml}
                    </div>
                `;
                
                container.appendChild(card);
            });
        }
        
        // 检查任务是否可用
        function checkTaskAvailable(task) {
            if (!task.dependencies || task.dependencies.length === 0) return true;
            
            for (const depId of task.dependencies) {
                const dep = tasks.find(t => t.id === depId);
                if (!dep || dep.status !== 'completed') return false;
            }
            return true;
        }
        
        // 更新进度
        function updateProgress() {
            const completed = tasks.filter(t => t.status === 'completed').length;
            const total = tasks.length;
            const percent = Math.round((completed / total) * 100);
            
            document.getElementById('progressText').textContent = `${completed} / ${total} (${percent}%)`;
            document.getElementById('progressBar').style.width = percent + '%';
        }
        
        // 开始任务
        function startTask(taskId) {
            const task = tasks.find(t => t.id === taskId);
            if (task) {
                task.status = 'in_progress';
                saveData();
                renderTasks();
                showToast('任务已开始', 'success');
            }
        }
        
        // 打开上传对话框
        function openUploadModal(taskId) {
            currentTask = tasks.find(t => t.id === taskId);
            if (currentTask) {
                document.getElementById('uploadTaskName').textContent = currentTask.name;
                document.getElementById('uploadModal').classList.remove('hidden');
                document.getElementById('previewImg').classList.add('hidden');
                document.getElementById('confirmBtn').disabled = true;
                selectedFile = null;
            }
        }
        
        // 关闭上传对话框
        function closeUploadModal() {
            document.getElementById('uploadModal').classList.add('hidden');
            currentTask = null;
            selectedFile = null;
        }
        
        // 文件选择
        document.getElementById('dropZone').addEventListener('click', () => {
            document.getElementById('fileInput').click();
        });
        
        document.getElementById('fileInput').addEventListener('change', (e) => {
            if (e.target.files[0]) {
                handleFile(e.target.files[0]);
            }
        });
        
        function handleFile(file) {
            if (file && file.type.startsWith('image/')) {
                selectedFile = file;
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById('previewImg').src = e.target.result;
                    document.getElementById('previewImg').classList.remove('hidden');
                    document.getElementById('confirmBtn').disabled = false;
                };
                reader.readAsDataURL(file);
            }
        }
        
        // 确认上传
        function confirmUpload() {
            if (currentTask && selectedFile) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    currentTask.screenshot = e.target.result;
                    currentTask.status = 'completed';
                    currentTask.completed_at = new Date().toLocaleString('zh-CN');
                    saveData();
                    renderTasks();
                    updateProgress();
                    closeUploadModal();
                    showToast('任务完成！已发送审核邮件', 'success');
                    
                    // 发送邮件提醒（模拟）
                    sendEmail(currentTask);
                };
                reader.readAsDataURL(selectedFile);
            }
        }
        
        // 撤销任务
        function undoTask(taskId) {
            const task = tasks.find(t => t.id === taskId);
            if (task) {
                task.status = 'pending';
                task.screenshot = null;
                task.completed_at = null;
                saveData();
                renderTasks();
                updateProgress();
                showToast('任务已撤销', 'warning');
            }
        }
        
        // 发送邮件
        function sendEmail(task) {
            console.log('发送邮件给老司机审核:', task.name, task.email);
            // 实际邮件发送需要后端支持
        }
        
        // Toast通知
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'fixed top-4 right-4 px-6 py-3 rounded-lg shadow-lg z-50 transform transition-transform duration-300 ' + 
                (type === 'success' ? 'bg-green-500' : 'bg-amber-500');
            toast.style.transform = 'translateX(0)';
            
            setTimeout(() => {
                toast.style.transform = 'translateX(150%)';
            }, 3000);
        }
        
        // 页面加载完成后初始化
        init();
    </script>
</body>
</html>
